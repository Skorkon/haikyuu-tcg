<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HV-TCG · Deckbuilder</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+JP:wght@400;500;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0d0f;
    --surface: #16161a;
    --surface2: #1e1e24;
    --surface3: #26262e;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.13);
    --text: #e8e8ec;
    --text2: #9090a0;
    --text3: #5a5a70;
    --accent: #E8761A;
    --blue: #3a8ee6;
    --green: #2ea84e;
    --gold: #f0c040;
    --font-display: 'Bebas Neue', sans-serif;
    --font-body: 'Noto Sans JP', sans-serif;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    font-size: 14px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    display: flex;
    align-items: center;
    gap: 20px;
    padding: 16px 28px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo { font-family: var(--font-display); font-size: 28px; letter-spacing: 3px; color: var(--accent); line-height: 1; }
  .logo span { color: var(--text2); font-size: 14px; letter-spacing: 1px; font-family: var(--font-body); }
  nav { display: flex; gap: 4px; margin-left: auto; }
  nav button {
    background: transparent; border: 1px solid var(--border2); color: var(--text2);
    padding: 7px 18px; border-radius: 6px; cursor: pointer;
    font-family: var(--font-body); font-size: 13px; transition: all .15s;
  }
  nav button:hover { border-color: var(--accent); color: var(--text); }
  nav button.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  .app { display: flex; flex: 1; overflow: hidden; height: calc(100vh - 61px); }

  /* CATALOGUE */
  .catalogue { display: flex; flex-direction: column; flex: 1; min-width: 0; border-right: 1px solid var(--border); overflow: hidden; }

  .filters {
    padding: 14px 20px; background: var(--surface); border-bottom: 1px solid var(--border);
    display: flex; flex-wrap: wrap; gap: 8px; align-items: center;
  }
  .search-wrap { position: relative; flex: 1; min-width: 180px; }
  .search-wrap svg { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); width: 15px; height: 15px; stroke: var(--text3); fill: none; stroke-width: 2; pointer-events: none; }
  .search-wrap input {
    width: 100%; background: var(--surface2); border: 1px solid var(--border2);
    border-radius: 6px; color: var(--text); padding: 7px 10px 7px 32px;
    font-family: var(--font-body); font-size: 13px; outline: none; transition: border-color .15s;
  }
  .search-wrap input:focus { border-color: var(--accent); }

  select {
    background: var(--surface2); border: 1px solid var(--border2); border-radius: 6px;
    color: var(--text); padding: 7px 10px; font-family: var(--font-body); font-size: 13px; cursor: pointer; outline: none;
  }
  select:focus { border-color: var(--accent); }

  .filter-pills { display: flex; gap: 5px; flex-wrap: wrap; }
  .pill {
    padding: 4px 12px; border-radius: 20px; border: 1px solid var(--border2);
    background: var(--surface2); color: var(--text2); font-size: 12px; cursor: pointer; transition: all .15s; white-space: nowrap;
  }
  .pill:hover { border-color: var(--text2); color: var(--text); }
  .pill.on { background: var(--accent); border-color: var(--accent); color: #fff; }
  .pill.on.tipo-evento { background: var(--blue); border-color: var(--blue); }

  .card-count { font-size: 12px; color: var(--text3); padding: 8px 20px; background: var(--surface); border-bottom: 1px solid var(--border); }

  .catalogue-grid {
    flex: 1; overflow-y: auto; padding: 16px 20px;
    display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
    gap: 12px; align-content: start;
  }

  /* CARD THUMB */
  .card-thumb {
    background: var(--surface2); border: 1px solid var(--border); border-radius: 8px;
    overflow: hidden; cursor: pointer; transition: transform .12s, border-color .12s, box-shadow .12s;
    position: relative; display: flex; flex-direction: column; user-select: none;
  }
  .card-thumb:hover { transform: translateY(-3px); border-color: var(--border2); box-shadow: 0 8px 24px rgba(0,0,0,.5); }
  .card-thumb.in-deck { border-color: var(--accent); }

  .card-art { width: 100%; aspect-ratio: 2/3; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; }
  .card-art img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .card-art .fallback { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 36px; pointer-events: none; }

  .art-Karasuno      { background: linear-gradient(160deg,#1a1a2e,#3d0a0a); }
  .art-Nekoma        { background: linear-gradient(160deg,#1a0a0a,#0a2a0a); }
  .art-Fukurodani    { background: linear-gradient(160deg,#0a0a2e,#1a1a0a); }
  .art-Shiratorizawa { background: linear-gradient(160deg,#1a0a2e,#0a2a0a); }
  .art-Inarizaki     { background: linear-gradient(160deg,#111,#222); }
  .art-Kamomedai     { background: linear-gradient(160deg,#0a0a2e,#0a2a3e); }
  .art-Itachiyama    { background: linear-gradient(160deg,#0a2a0a,#1a3e0a); }
  .art-evento        { background: linear-gradient(160deg,#0a1a2e,#0a2e2e); }
  .art-default       { background: linear-gradient(160deg,#1a1a1a,#2e2e2e); }

  .card-rarity-bar { position: absolute; bottom: 0; left: 0; right: 0; height: 3px; z-index: 2; }
  .rarity-DP,.rarity-TP { background: linear-gradient(90deg,#ff6b35,#e8231a,#ff6b35); }
  .rarity-S              { background: linear-gradient(90deg,#f0c040,#ffd700); }
  .rarity-R,.rarity-RP   { background: linear-gradient(90deg,#3a8ee6,#60b0ff); }
  .rarity-N,.rarity-NP   { background: #5a5a70; }
  .rarity-P              { background: linear-gradient(90deg,#b060ff,#e060ff); }
  .rarity-T              { background: linear-gradient(90deg,#2ea84e,#60d080); }
  .rarity-D              { background: #3a5a8e; }

  .card-info { padding: 6px 8px; display: flex; flex-direction: column; gap: 2px; }
  .card-name { font-size: 11px; font-weight: 700; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .card-meta { font-size: 10px; color: var(--text3); display: flex; justify-content: space-between; }
  .card-stats { display: flex; gap: 2px; margin-top: 2px; }
  .stat { flex: 1; text-align: center; font-size: 8px; padding: 2px 0; border-radius: 3px; line-height: 1.4; }
  .stat-label { color: var(--text3); font-size: 7px; display: block; }
  .stat-val   { font-weight: 700; display: block; }
  .stat-s  { background: rgba(240,192,64,.1);  color: var(--gold); }
  .stat-r  { background: rgba(58,142,230,.1);  color: var(--blue); }
  .stat-p  { background: rgba(46,168,78,.1);   color: var(--green); }
  .stat-rm { background: rgba(232,35,26,.1);   color: var(--accent); }
  .stat-b  { background: rgba(90,90,112,.15);  color: var(--text2); }

  .card-add-btn {
    position: absolute; top: 6px; right: 6px; width: 24px; height: 24px;
    background: rgba(0,0,0,.75); border: 1px solid var(--border2); border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: 15px; color: var(--text2); transition: all .12s; z-index: 3;
  }
  .card-add-btn:hover { background: var(--accent); border-color: var(--accent); color: #fff; }

  .card-count-badge {
    position: absolute; top: 6px; left: 6px; background: var(--accent); color: #fff;
    font-size: 11px; font-weight: 700; width: 20px; height: 20px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center; z-index: 3;
  }

  /* DECK PANEL */
  .deck-panel { width: 320px; min-width: 300px; display: flex; flex-direction: column; background: var(--surface); overflow: hidden; }
  .deck-header { padding: 14px 18px 10px; border-bottom: 1px solid var(--border); }
  .deck-title-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .deck-name-input {
    flex: 1; background: var(--surface2); border: 1px solid var(--border2); border-radius: 6px;
    color: var(--text); padding: 6px 10px; font-family: var(--font-body); font-size: 14px; font-weight: 700; outline: none; transition: border-color .15s;
  }
  .deck-name-input:focus { border-color: var(--accent); }
  .deck-stats-row { display: flex; gap: 6px; font-size: 12px; flex-wrap: wrap; }
  .deck-stat { padding: 3px 10px; border-radius: 4px; background: var(--surface3); color: var(--text2); }
  .deck-stat.warn { background: rgba(232,35,26,.15); color: var(--accent); }
  .deck-stat.ok   { background: rgba(46,168,78,.15); color: var(--green); }

  .deck-actions { padding: 10px 18px; display: flex; gap: 6px; border-bottom: 1px solid var(--border); }
  .btn {
    flex: 1; padding: 7px 6px; border-radius: 6px; border: 1px solid var(--border2);
    background: var(--surface2); color: var(--text2); font-family: var(--font-body);
    font-size: 12px; cursor: pointer; transition: all .15s; text-align: center; white-space: nowrap;
  }
  .btn:hover { border-color: var(--text2); color: var(--text); }
  .btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  .btn.primary:hover { background: #c01a12; }
  .btn.success { background: var(--green); border-color: var(--green); color: #fff; }
  .btn.success:hover { opacity: .85; }

  .deck-list { flex: 1; overflow-y: auto; padding: 10px 0; }
  .deck-section-title { font-size: 10px; font-weight: 700; letter-spacing: 1.5px; color: var(--text3); padding: 8px 18px 4px; text-transform: uppercase; }
  .deck-entry { display: flex; align-items: center; gap: 7px; padding: 4px 18px; transition: background .1s; }
  .deck-entry:hover { background: var(--surface2); }
  .deck-entry-img { width: 28px; height: 42px; border-radius: 3px; overflow: hidden; flex-shrink: 0; background: var(--surface3); }
  .deck-entry-img img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .deck-entry-color { width: 3px; height: 36px; border-radius: 2px; flex-shrink: 0; }
  .deck-entry-name { flex: 1; font-size: 11px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .deck-entry-sub  { font-size: 10px; color: var(--text3); }
  .deck-entry-qty  { font-size: 13px; font-weight: 700; color: var(--text2); min-width: 16px; text-align: center; }
  .deck-entry-rm {
    width: 20px; height: 20px; border: 1px solid transparent; border-radius: 4px;
    background: transparent; color: var(--text3); cursor: pointer; font-size: 13px;
    display: flex; align-items: center; justify-content: center; transition: all .12s; flex-shrink: 0;
  }
  .deck-entry-rm:hover { border-color: var(--accent); color: var(--accent); }

  .deck-empty { padding: 40px 20px; text-align: center; color: var(--text3); font-size: 13px; }
  .deck-empty-icon { font-size: 36px; margin-bottom: 10px; }

  /* SAVED DECKS */
  .saved-decks-bar { border-top: 1px solid var(--border); padding: 10px 18px 12px; max-height: 190px; overflow-y: auto; }
  .saved-title { font-size: 10px; font-weight: 700; letter-spacing: 1.5px; color: var(--text3); text-transform: uppercase; margin-bottom: 8px; }
  .saved-deck-item {
    display: flex; align-items: center; gap: 6px; padding: 5px 8px; border-radius: 6px;
    border: 1px solid var(--border); margin-bottom: 5px; cursor: pointer; transition: all .12s; background: var(--surface2);
  }
  .saved-deck-item:hover { border-color: var(--border2); }
  .saved-deck-item.active { border-color: var(--accent); }
  .saved-deck-name  { flex: 1; font-size: 12px; font-weight: 700; color: var(--text); }
  .saved-deck-count { font-size: 11px; color: var(--text3); }
  .saved-deck-del   { background: transparent; border: none; color: var(--text3); cursor: pointer; font-size: 15px; padding: 0 2px; transition: color .12s; }
  .saved-deck-del:hover { color: var(--accent); }

  /* PREDEFINED TAB */
  .predefined-panel { flex: 1; overflow-y: auto; padding: 24px 28px; }
  .predefined-panel h2 { font-family: var(--font-display); font-size: 28px; letter-spacing: 2px; margin-bottom: 6px; }
  .predefined-panel > p { color: var(--text2); font-size: 13px; margin-bottom: 28px; }
  .predefined-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
  .pre-deck-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; transition: transform .12s, border-color .12s; }
  .pre-deck-card:hover { transform: translateY(-2px); border-color: var(--border2); }
  .pre-deck-banner { height: 80px; display: flex; align-items: center; justify-content: center; font-size: 42px; }
  .pre-deck-body { padding: 14px 16px 16px; }
  .pre-deck-name { font-weight: 700; font-size: 15px; margin-bottom: 4px; }
  .pre-deck-desc { font-size: 12px; color: var(--text2); margin-bottom: 12px; line-height: 1.5; }
  .pre-deck-tags { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 12px; }
  .pre-tag { font-size: 10px; padding: 2px 8px; border-radius: 3px; border: 1px solid var(--border2); color: var(--text2); }
  .pre-deck-load { width: 100%; padding: 8px; border-radius: 6px; border: 1px solid var(--accent); background: transparent; color: var(--accent); font-family: var(--font-body); font-size: 12px; cursor: pointer; transition: all .15s; }
  .pre-deck-load:hover { background: var(--accent); color: #fff; }

  /* PREVIEW MODAL */
  .card-preview-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.65); z-index: 200; align-items: center; justify-content: center; }
  .card-preview-overlay.show { display: flex; }
  .card-preview { background: var(--surface2); border: 1px solid var(--border2); border-radius: 12px; width: 380px; max-width: 95vw; overflow: hidden; }
  .preview-art { height: 500px; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; }
  .preview-art img { width: 100%; height: 100%; object-fit: contain; display: block; }
  .preview-art .fallback-big { position: absolute; font-size: 80px; pointer-events: none; }
  .preview-body { padding: 18px; }
  .preview-name { font-size: 20px; font-weight: 700; margin-bottom: 2px; }
  .preview-id   { font-size: 11px; color: var(--text3); margin-bottom: 12px; }
  .preview-tags { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 12px; }
  .preview-tag  { font-size: 11px; padding: 3px 10px; border-radius: 4px; background: var(--surface3); color: var(--text2); }
  .preview-stats { display: grid; grid-template-columns: repeat(5,1fr); gap: 6px; margin-bottom: 14px; }
  .preview-stat { text-align: center; background: var(--surface3); border-radius: 5px; padding: 6px 2px; }
  .preview-stat-l { font-size: 9px; color: var(--text3); display: block; text-transform: uppercase; letter-spacing: .5px; }
  .preview-stat-v { font-size: 18px; font-weight: 700; display: block; }
  .preview-desc { font-size: 12px; color: var(--text2); line-height: 1.6; border-top: 1px solid var(--border); padding-top: 12px; margin-bottom: 14px; }
  .preview-actions { display: flex; gap: 8px; }
  .preview-close { padding: 9px 16px; border-radius: 6px; border: 1px solid var(--border2); background: transparent; color: var(--text2); font-family: var(--font-body); cursor: pointer; flex: 1; }
  .preview-add  { padding: 9px 16px; border-radius: 6px; border: none; background: var(--accent); color: #fff; font-family: var(--font-body); font-weight: 700; cursor: pointer; flex: 2; transition: opacity .15s; }
  .preview-add:hover { opacity: .85; }

  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 3px; }

  .toast {
    position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%) translateY(80px);
    background: var(--surface2); border: 1px solid var(--border2); color: var(--text);
    padding: 10px 22px; border-radius: 8px; font-size: 13px; z-index: 500;
    transition: transform .25s; white-space: nowrap; pointer-events: none;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .hidden { display: none !important; }
</style>
</head>
<body>

<header>
  <div class="logo">HV<span>·TCG</span></div>
  <nav>
    <button class="active" id="tab-builder"    onclick="setTab('builder')">Constructor</button>
    <button            id="tab-predefined" onclick="setTab('predefined')">Decks predefinidos</button>
  </nav>
</header>

<div class="card-preview-overlay" id="previewOverlay" onclick="closePreview(event)">
  <div class="card-preview">
    <div class="preview-art" id="previewArt"></div>
    <div class="preview-body">
      <div class="preview-name" id="previewName"></div>
      <div class="preview-id"   id="previewId"></div>
      <div class="preview-tags" id="previewTags"></div>
      <div class="preview-stats" id="previewStats"></div>
      <div class="preview-desc"  id="previewDesc"></div>
      <div class="preview-actions">
        <button class="preview-close" onclick="closePreview()">Cerrar</button>
        <button class="preview-add"   id="previewAddBtn">+ Añadir al deck</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- BUILDER -->
<div class="app" id="appBuilder">
  <div class="catalogue">
    <div class="filters">
      <div class="search-wrap">
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="searchInput" placeholder="Buscar carta..." oninput="applyFilters()">
      </div>
      <select id="filterEscuela"  onchange="applyFilters()"><option value="">Todas las escuelas</option></select>
      <select id="filterPosicion" onchange="applyFilters()">
        <option value="">Todas las posiciones</option>
        <option value="MB">MB — Middle Blocker</option>
        <option value="S">S — Setter</option>
        <option value="WS">WS — Wing Spiker</option>
        <option value="L">L — Libero</option>
      </select>
      <select id="filterRareza" onchange="applyFilters()">
        <option value="">Todas las rarezas</option>
        <option value="DP">DP</option><option value="TP">TP</option><option value="S">S</option>
        <option value="R">R</option><option value="RP">RP</option><option value="T">T</option>
        <option value="N">N</option><option value="NP">NP</option><option value="P">P</option><option value="D">D</option>
      </select>
      <div class="filter-pills">
        <span class="pill" data-filter="tipo" data-val="personaje" onclick="togglePill(this)">Personaje</span>
        <span class="pill tipo-evento" data-filter="tipo" data-val="evento" onclick="togglePill(this)">Evento</span>
        <span class="pill" data-filter="hab" data-val="si" onclick="togglePill(this)">Con habilidad</span>
      </div>
      <button class="pill" onclick="resetFiltros()" style="border-color:var(--border2);">✕ Resetear filtros</button>
    </div>
    <div class="card-count" id="cardCount">Cargando catálogo...</div>
    <div class="catalogue-grid" id="catalogueGrid"></div>
  </div>

  <div class="deck-panel">
    <div class="deck-header">
      <div class="deck-title-row">
        <input type="text" class="deck-name-input" id="deckNameInput" value="Mi deck">
      </div>
      <div class="deck-stats-row">
        <span class="deck-stat" id="statTotal">0 / 40</span>
        <span class="deck-stat" id="statEventos">0 eventos</span>
        <span class="deck-stat" id="statEscuelas">0 escuelas</span>
      </div>
    </div>
    <div class="deck-actions">
      <button class="btn" onclick="clearDeck()">Vaciar</button>
      <button class="btn primary" onclick="saveDeck()">Guardar</button>
      <button class="btn success" onclick="exportDeck()">Exportar</button>
      <label class="btn" for="importFileInput" style="cursor:pointer;text-align:center;">Importar</label>
      <input type="file" id="importFileInput" accept=".json" onchange="importDeck(event)" style="display:none">
    </div>
    <div class="deck-list" id="deckList">
      <div class="deck-empty">
        <div class="deck-empty-icon">🃏</div>
        <div>Haz clic en una carta<br>para añadirla al deck</div>
      </div>
    </div>
    <div class="saved-decks-bar">
      <div class="saved-title">Decks guardados</div>
      <div id="savedDecksList"></div>
    </div>
  </div>
</div>

<!-- PREDEFINED -->
<div class="predefined-panel hidden" id="appPredefined">
  <h2>Decks predefinidos</h2>
  <p>Selecciona un deck para cargarlo en el constructor y editarlo a tu gusto.</p>
  <div class="predefined-grid" id="predefinedGrid"></div>
</div>

<!--
  STUBS de funciones del juego que cartas.js referencia.
  Aquí no hacen nada: solo evitan errores de JS al cargar el archivo.
  crearCarta() se redefine justo después para extraer solo los datos.
-->
<script>
function usarGuts()               { return false; }
function robarCarta()             {}
function añadirCartaAMano()       {}
function pagarConEvento()         { return false; }
function negarBloqueadoresApoyo() {}
function negarReceptorAlto()      {}
function debilitarRematador()     {}
function tendoSatori()            {}
function kageyamaSP()             {}
function doshat()                 {}
function blockout()               {}
function renderMano()             {}
function renderCampo()            {}
function actualizarFaseUI()       {}
function log()                    {}

// Esta versión de crearCarta extrae solo los datos que necesita el deckbuilder.
// Cuando cartas.js llame a crearCarta(), usará esta definición.
function crearCarta(nombre, stats, habilidadFn, info) {
  return {
    nombre,
    stats,
    habilidad:       typeof habilidadFn === 'function',
    tipo:            info.tipo            || 'personaje',
    id:              info.id              || '',
    escuela:         info.escuela         || '',
    posicion:        info.posicion        || null,
    rareza:          info.rareza          || 'N',
    anyo:            info.anyo            || null,
    fases:           info.fases           || [],
    descripcion:     info.descripcion     || '',
    zonasProhibidas: info.zonasProhibidas || [],
  };
}
</script>

<!-- Tu cartas.js real — el deckbuilder leerá el catálogo de aquí -->
<script src="cartas.js"></script>

<script>
// ── CATÁLOGO ──────────────────────────────────────────────
const CATALOGUE = inicializarCartas();

// ── ESTADO ────────────────────────────────────────────────
let deck          = [];
let savedDecks    = JSON.parse(localStorage.getItem('hv-decks') || '[]');
let currentDeckId = null;
let activeFilters = { tipo: null, hab: null };
let _previewCard  = null;

// ── UTILIDADES ────────────────────────────────────────────
const imgPath = id => `img/cartas/${id}.png`;

function getArtClass(c) {
  if (c.tipo === 'evento') return 'art-evento';
  const known = ['Karasuno','Nekoma','Fukurodani','Shiratorizawa','Inarizaki','Kamomedai','Itachiyama', 'Wakutani Minami', 'Date Kôgyô'];
  return 'art-' + (known.includes(c.escuela) ? c.escuela : 'default');
}

function getSchoolColor(escuela) {
  const m = { Karasuno:'#E8761A', Nekoma:'#E8761A', Fukurodani:'#555555',
              Shiratorizawa:'#6A1B9A', Inarizaki:'#666666', Kamomedai:'#4a9ee6', Itachiyama:'#F9A825',
              'Wakutani Minami': '#E91E8C', 'Date Kôgyô': '#1B5E20'};
  return m[escuela] || '#5a5a70';
}

function getEmoji(c) {
  const m = { Karasuno:'🔴', Nekoma:'🐱', Fukurodani:'🦅', Shiratorizawa:'🦁',
              Inarizaki:'⚫', Kamomedai:'🔵', Itachiyama:'🏆' };
  return c.tipo === 'evento' ? '✨' : (m[c.escuela] || '⚡');
}

const rarityLabel = r => ({ DP:'Double Parallel',TP:'Triple Parallel',S:'Super',R:'Rare',
  RP:'Rare Parallel',T:'Trigger',N:'Normal',NP:'Normal Parallel',P:'Parallel',D:'D' }[r] || r);

const posLabel = p => ({ MB:'Middle Blocker',S:'Setter',WS:'Wing Spiker',L:'Libero' }[p] || p);

function showToast(msg, ms=2200) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._tid);
  t._tid = setTimeout(() => t.classList.remove('show'), ms);
}

// ── INIT ──────────────────────────────────────────────────
function init() {
  const escuelas = [...new Set(CATALOGUE.map(c => c.escuela).filter(Boolean))].sort();
  const sel = document.getElementById('filterEscuela');
  escuelas.forEach(e => { const o = document.createElement('option'); o.value = e; o.textContent = e; sel.appendChild(o); });
  applyFilters();
  renderSavedDecks();
  renderPredefined();
}

// ── CATÁLOGO RENDER ───────────────────────────────────────
function applyFilters() {
  const q        = document.getElementById('searchInput').value.toLowerCase().trim();
  const escuela  = document.getElementById('filterEscuela').value;
  const posicion = document.getElementById('filterPosicion').value;
  const rareza   = document.getElementById('filterRareza').value;

  const result = CATALOGUE.filter(c => {
    if (q        && !c.nombre.toLowerCase().includes(q) && !(c.id||'').toLowerCase().includes(q)) return false;
    if (escuela  && c.escuela  !== escuela)  return false;
    if (posicion && c.posicion !== posicion) return false;
    if (rareza   && c.rareza   !== rareza)   return false;
    if (activeFilters.tipo && c.tipo !== activeFilters.tipo) return false;
    if (activeFilters.hab === 'si' && !c.habilidad)         return false;
    return true;
  });

  document.getElementById('cardCount').textContent = `${result.length} cartas`;
  const grid = document.getElementById('catalogueGrid');
  grid.innerHTML = '';
  result.forEach(c => grid.appendChild(buildCardThumb(c)));
}

function buildCardThumb(c) {
  const qty = getDeckQty(c.id);
  const div = document.createElement('div');
  div.className = 'card-thumb' + (qty > 0 ? ' in-deck' : '');
  div.dataset.id = c.id;

  div.innerHTML = `
    <div class="card-art ${getArtClass(c)}">
      <img src="${imgPath(c.id)}" alt="${c.nombre}"
           onerror="this.style.display='none'">
      <div class="fallback"></div>
      <div class="card-rarity-bar rarity-${c.rareza}"></div>
    </div>
    ${qty > 0 ? `<div class="card-count-badge">${qty}</div>` : ''}
    <button class="card-add-btn" title="Añadir al deck">+</button>
    <div class="card-info">
      <div class="card-name" title="${c.nombre}">${c.nombre}</div>
      <div class="card-meta">
        <span>${c.tipo === 'evento' ? 'Evento' : (c.escuela||'')}</span>
        <span>${c.rareza}</span>
      </div>
      ${c.tipo === 'personaje'
        ? `<div class="card-stats">
            <div class="stat stat-s"><span class="stat-label">SAQ</span><span class="stat-val">${c.stats.saque}</span></div>
            <div class="stat stat-r"><span class="stat-label">REC</span><span class="stat-val">${c.stats.recepcion}</span></div>
            <div class="stat stat-p"><span class="stat-label">PAS</span><span class="stat-val">${c.stats.pase}</span></div>
            <div class="stat stat-rm"><span class="stat-label">REM</span><span class="stat-val">${c.stats.remate}</span></div>
            <div class="stat stat-b"><span class="stat-label">BLQ</span><span class="stat-val">${c.stats.bloqueo}</span></div>
           </div>`
        : `<div style="font-size:10px;color:var(--text3);margin-top:3px">${(c.fases||[]).join(' · ') || 'Evento'}</div>`
      }
    </div>`;

  div.querySelector('.card-add-btn').addEventListener('click', e => { e.stopPropagation(); addToDeck(c); });
  div.addEventListener('click', () => openPreview(c));
  return div;
}

function refreshThumb(id) {
  const el = document.querySelector(`.card-thumb[data-id="${id}"]`);
  if (!el) return;
  const qty = getDeckQty(id);
  el.classList.toggle('in-deck', qty > 0);
  let badge = el.querySelector('.card-count-badge');
  if (qty > 0) {
    if (!badge) { badge = document.createElement('div'); badge.className = 'card-count-badge'; el.querySelector('.card-art').after(badge); }
    badge.textContent = qty;
  } else badge?.remove();
}

function togglePill(el) {
  const filter = el.dataset.filter;
  const val    = el.dataset.val;
  const wasOn  = el.classList.contains('on');
  document.querySelectorAll(`.pill[data-filter="${filter}"]`).forEach(p => p.classList.remove('on'));
  activeFilters[filter] = wasOn ? null : val;
  if (!wasOn) el.classList.add('on');
  applyFilters();
}
function resetFiltros() {
  document.getElementById('searchInput').value = '';
  document.getElementById('filterEscuela').value = '';
  document.getElementById('filterPosicion').value = '';
  document.getElementById('filterRareza').value = '';
  activeFilters = { tipo: null, hab: null };
  document.querySelectorAll('.pill.on').forEach(p => p.classList.remove('on'));
  applyFilters();
}

// ── DECK LOGIC ────────────────────────────────────────────
const getDeckQty = id => deck.find(e => e.carta.id === id)?.qty || 0;

function addToDeck(c) {
  const total   = deck.reduce((s,e) => s+e.qty, 0);
  const eventos = deck.filter(e => e.carta.tipo === 'evento').reduce((s,e) => s+e.qty, 0);
  if (total >= 40)                         { showToast('El deck ya tiene 40 cartas ✋'); return; }
  if (c.tipo === 'evento' && eventos >= 8) { showToast('Máximo 8 eventos por deck ✋'); return; }
  const entry = deck.find(e => e.carta.id === c.id);
  if (entry) entry.qty++; else deck.push({ carta: c, qty: 1 });
  refreshThumb(c.id);
  renderDeckList();
  showToast(`${c.nombre} añadida`);
}

function removeFromDeck(id, all=false) {
  const idx = deck.findIndex(e => e.carta.id === id);
  if (idx === -1) return;
  if (all || deck[idx].qty <= 1) deck.splice(idx, 1); else deck[idx].qty--;
  refreshThumb(id);
  renderDeckList();
}

function clearDeck() {
  if (!deck.length) return;
  deck = []; currentDeckId = null;
  document.getElementById('deckNameInput').value = 'Mi deck';
  document.querySelectorAll('.card-thumb').forEach(el => {
    el.classList.remove('in-deck');
    el.querySelector('.card-count-badge')?.remove();
  });
  renderDeckList();
  showToast('Deck vaciado');
}

function renderDeckList() {
  const list    = document.getElementById('deckList');
  const total   = deck.reduce((s,e) => s+e.qty, 0);
  const eventos = deck.filter(e => e.carta.tipo === 'evento').reduce((s,e) => s+e.qty, 0);
  const escuelas = new Set(deck.filter(e => e.carta.tipo === 'personaje').map(e => e.carta.escuela));

  const st = document.getElementById('statTotal');
  st.textContent = `${total} / 40`;
  st.className   = 'deck-stat' + (total === 40 ? ' ok' : total > 40 ? ' warn' : '');
  const se = document.getElementById('statEventos');
  se.textContent = `${eventos} / 8 eventos`;
  se.className   = 'deck-stat' + (eventos > 8 ? ' warn' : '');
  document.getElementById('statEscuelas').textContent = `${escuelas.size} escuelas`;

  if (!deck.length) {
    list.innerHTML = `<div class="deck-empty"><div class="deck-empty-icon">🃏</div><div>Haz clic en una carta<br>para añadirla al deck</div></div>`;
    return;
  }

  const personajes = deck.filter(e => e.carta.tipo === 'personaje')
    .sort((a,b) => a.carta.escuela.localeCompare(b.carta.escuela) || a.carta.nombre.localeCompare(b.carta.nombre));
  const evts = deck.filter(e => e.carta.tipo === 'evento');

  const entryHTML = ({carta,qty}) => `
    <div class="deck-entry" onclick="openPreview(CATALOGUE.find(c=>c.id==='${carta.id}'))" style="cursor:pointer">
      <div class="deck-entry-img">
        <img src="${imgPath(carta.id)}" alt="${carta.nombre}" onerror="this.style.display='none'">
      </div>
      <div class="deck-entry-color" style="background:${carta.tipo==='evento' ? 'var(--blue)' : getSchoolColor(carta.escuela)}"></div>
      <div style="flex:1;overflow:hidden">
        <div class="deck-entry-name" title="${carta.nombre}">${carta.nombre}</div>
        <div class="deck-entry-sub">${carta.tipo==='evento' ? 'Evento' : carta.escuela} · ${carta.rareza}</div>
      </div>
      <div class="deck-entry-qty">${qty}</div>
      <button class="deck-entry-rm" onclick="event.stopPropagation(); removeFromDeck('${carta.id}')"      title="Quitar una">−</button>
      <button class="deck-entry-rm" onclick="event.stopPropagation(); removeFromDeck('${carta.id}',true)" title="Quitar todas">✕</button>
    </div>`;

  let html = '';
  if (personajes.length) { html += `<div class="deck-section-title">Personajes (${personajes.reduce((s,e)=>s+e.qty,0)})</div>`; html += personajes.map(entryHTML).join(''); }
  if (evts.length)       { html += `<div class="deck-section-title">Eventos (${evts.reduce((s,e)=>s+e.qty,0)})</div>`;          html += evts.map(entryHTML).join(''); }
  list.innerHTML = html;
}

// ── SAVE / LOAD / EXPORT / IMPORT ────────────────────────
function saveDeck() {
  const nombre = document.getElementById('deckNameInput').value.trim() || 'Mi deck';
  if (!deck.length) { showToast('El deck está vacío ✋'); return; }
  const data = { id: currentDeckId || Date.now().toString(), nombre,
    total: deck.reduce((s,e)=>s+e.qty,0),
    entries: deck.map(e => ({ id: e.carta.id, qty: e.qty })),
    fecha: new Date().toLocaleDateString('es-ES') };
  currentDeckId = data.id;
  const idx = savedDecks.findIndex(d => d.id === data.id);
  if (idx !== -1) savedDecks[idx] = data; else savedDecks.push(data);
  localStorage.setItem('hv-decks', JSON.stringify(savedDecks));
  renderSavedDecks();
  showToast(`"${nombre}" guardado ✅`);
}

function loadSavedDeck(id) {
  const saved = savedDecks.find(d => d.id === id);
  if (!saved) return;
  deck = [];
  saved.entries.forEach(e => { const c = CATALOGUE.find(x => x.id === e.id); if (c) deck.push({ carta: c, qty: e.qty }); });
  currentDeckId = saved.id;
  document.getElementById('deckNameInput').value = saved.nombre;
  document.querySelectorAll('.card-thumb').forEach(el => { el.classList.remove('in-deck'); el.querySelector('.card-count-badge')?.remove(); });
  deck.forEach(e => refreshThumb(e.carta.id));
  renderDeckList(); renderSavedDecks();
  showToast(`"${saved.nombre}" cargado`);
  setTab('builder');
}

function deleteSavedDeck(id, ev) {
  ev.stopPropagation();
  savedDecks = savedDecks.filter(d => d.id !== id);
  localStorage.setItem('hv-decks', JSON.stringify(savedDecks));
  if (currentDeckId === id) clearDeck();
  renderSavedDecks();
  showToast('Deck eliminado');
}

function renderSavedDecks() {
  const list = document.getElementById('savedDecksList');
  if (!savedDecks.length) { list.innerHTML = `<div style="font-size:12px;color:var(--text3);padding:4px 0">No hay decks guardados aún</div>`; return; }
  list.innerHTML = savedDecks.map(d => `
    <div class="saved-deck-item${d.id===currentDeckId?' active':''}" onclick="loadSavedDeck('${d.id}')">
      <span class="saved-deck-name">${d.nombre}</span>
      <span class="saved-deck-count">${d.total}/40 · ${d.fecha||''}</span>
      <button class="saved-deck-del" onclick="deleteSavedDeck('${d.id}',event)" title="Eliminar">✕</button>
    </div>`).join('');
}

function exportDeck() {
  const nombre = document.getElementById('deckNameInput').value.trim() || 'Mi deck';
  if (!deck.length) { showToast('El deck está vacío ✋'); return; }

  const total = deck.reduce((s, e) => s + e.qty, 0);
  if (total < 40) {
    const confirmar = confirm(
      `El deck tiene ${total}/40 cartas. ¿Exportar igualmente?\n\n` +
      `Un deck incompleto no podrá usarse en partidas online.`
    );
    if (!confirmar) return;
  }

  const data = {
    nombre,
    version: '1.0',
    fecha: new Date().toISOString(),
    entries: deck.map(e => ({ id: e.carta.id, nombre: e.carta.nombre, qty: e.qty }))
  };

  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = nombre.replace(/\s+/g, '-') + '.json';
  a.click();
  URL.revokeObjectURL(a.href);
  showToast('Deck exportado ✅');
}

function importDeck(event) {
  const file = event.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      if (!data.entries) throw '';
      deck = []; let nf = 0;
      data.entries.forEach(entry => { const c = CATALOGUE.find(x => x.id === entry.id); if (c) deck.push({carta:c,qty:entry.qty}); else nf++; });
      currentDeckId = null;
      document.getElementById('deckNameInput').value = data.nombre || 'Deck importado';
      document.querySelectorAll('.card-thumb').forEach(el => { el.classList.remove('in-deck'); el.querySelector('.card-count-badge')?.remove(); });
      deck.forEach(e => refreshThumb(e.carta.id));
      renderDeckList();
      showToast(`Importado${nf ? ` (${nf} no encontradas)` : ' ✅'}`);
    } catch { showToast('Fichero no válido ❌'); }
  };
  reader.readAsText(file);
  event.target.value = '';
}

// ── PREVIEW ───────────────────────────────────────────────
function openPreview(c) {
  _previewCard = c;
  const artDiv = document.getElementById('previewArt');
  artDiv.className = `preview-art ${getArtClass(c)}`;
  artDiv.innerHTML = `
    <img src="${imgPath(c.id)}" alt="${c.nombre}" onerror="this.style.display='none'">
    <div class="fallback-big"></div>
    <div class="card-rarity-bar rarity-${c.rareza}" style="position:absolute;bottom:0;left:0;right:0;height:4px;z-index:2"></div>`;

  document.getElementById('previewName').textContent = c.nombre;
  document.getElementById('previewId').textContent   = c.id + (c.anyo ? ` · Año ${c.anyo}` : '');

  const tags = [
    `<span class="preview-tag">${rarityLabel(c.rareza)}</span>`,
    c.posicion ? `<span class="preview-tag">${posLabel(c.posicion)}</span>` : '',
    `<span class="preview-tag">${c.escuela || 'Evento'}</span>`,
    c.habilidad ? `<span class="preview-tag" style="background:rgba(232,35,26,.15);color:var(--accent)">Con habilidad</span>` : '',
    ...(c.fases||[]).map(f=>`<span class="preview-tag">${f}</span>`),
  ];
  document.getElementById('previewTags').innerHTML = tags.join('');

  const ps = document.getElementById('previewStats');
  if (c.tipo === 'personaje') {
    ps.style.display = 'grid';
    ps.innerHTML = `
      <div class="preview-stat"><span class="preview-stat-l">Saque</span>  <span class="preview-stat-v" style="color:var(--gold)">${c.stats.saque}</span></div>
      <div class="preview-stat"><span class="preview-stat-l">Recep.</span> <span class="preview-stat-v" style="color:var(--blue)">${c.stats.recepcion}</span></div>
      <div class="preview-stat"><span class="preview-stat-l">Pase</span>   <span class="preview-stat-v" style="color:var(--green)">${c.stats.pase}</span></div>
      <div class="preview-stat"><span class="preview-stat-l">Remate</span> <span class="preview-stat-v" style="color:var(--accent)">${c.stats.remate}</span></div>
      <div class="preview-stat"><span class="preview-stat-l">Bloqueo</span><span class="preview-stat-v" style="color:var(--text2)">${c.stats.bloqueo}</span></div>`;
  } else { ps.style.display = 'none'; }

  document.getElementById('previewDesc').innerHTML = c.descripcion
    ? `<p>${c.descripcion}</p>`
    : `<p style="color:var(--text3);font-style:italic">Sin descripción disponible</p>`;

  document.getElementById('previewAddBtn').onclick = () => { addToDeck(c); closePreview(); };
  document.getElementById('previewOverlay').classList.add('show');
}

function closePreview(e) {
  if (e && e.target !== document.getElementById('previewOverlay')) return;
  document.getElementById('previewOverlay').classList.remove('show');
}

// ── PREDEFINED ────────────────────────────────────────────

  document.getElementById('predefinedGrid').innerHTML = PREDEFINED_DECKS.map((d,i) => `

function loadPredefined(idx) {

  deck.forEach(e => refreshThumb(e.carta.id));

// ── TABS ──────────────────────────────────────────────────
function setTab(tab) {
  document.getElementById('tab-builder').classList.toggle('active',    tab==='builder');
  document.getElementById('tab-predefined').classList.toggle('active', tab==='predefined');
  document.getElementById('appBuilder').classList.toggle('hidden',     tab!=='builder');
  document.getElementById('appPredefined').classList.toggle('hidden',  tab!=='predefined');
}

  if (e.key === 'Escape') closePreview();
