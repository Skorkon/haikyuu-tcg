<!DOCTYPE html>  <!-- Le dice al navegador que esto es HTML moderno -->
<meta charset="UTF-8">

<html>
<style>
  * {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  font-family: Arial, sans-serif;
  height: 100vh;
  display: flex;
  flex-direction: column;
  background: #d0d0d0;
}

/* -------------------------------------------------- BARRA SUPERIOR */
.top-bar {
  background: black;
  color: white;
  padding: 8px 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 14px;
}

/* -------------------------------------------------- ZONA PRINCIPAL */
.main {
  display: flex;
  flex: 1;
  overflow: hidden;
}

/* -------------------------------------------------- IZQUIERDA 20% */
.panel-izquierda {
  width: 30%;
  background: #f2f2f2;
  padding: 10px;
  overflow-y: auto;
  border-right: 2px solid #ccc;
}

/* -------------------------------------------------- CENTRO 60% */
.campo-central {
  position: relative;
  width: 50%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  flex: 1;
  background: #d4b483;
  padding: 10px;
}
.lado-jugador {
  position: relative;
  width: 660px;
  height: 240px;
}
.red-linea {
  width: 660px;
  height: 8px;
  background: black;
  margin: 8px 0;
  border-radius: 4px;
}
.red-linea {
  position: relative;
  display: flex;
  justify-content: center;
  gap: 10px;
  align-items: center;
}

.contador-campo {
  background: rgba(0, 0, 0, 0.85); /* fondo negro con opacidad */
  color: white;
  font-size: 14px;
  font-weight: bold;
  padding: 4px 10px;
  border-radius: 6px;              /* bordes redondeados */
  z-index: 10;
}

#contador-ataque {
  position: absolute;
  top: -20px;    /* ajusta hacia arriba */
  left: 10px;    /* ajusta hacia la izquierda */
}

#contador-defensa {
  position: absolute;
  top: -20px;    /* ajusta hacia arriba */
  left: 70px;    /* un poco más a la derecha que el ataque */
}

/* -------------------------------------------------- DERECHA 20% */
.panel-derecha {
  width: 20%;
  background: #f9f9f9;
  padding: 10px;
  overflow-y: auto;
  border-left: 2px solid #ccc;
}

/* -------------------------------------------------- LOG */
#log {
  white-space: pre-wrap;
  font-size: 12px;
  flex-direction: column;  /* cada línea debajo de la anterior */
  gap: 2px;                /* pequeño espacio entre líneas */
}

/* -------------------------------------------------- MANO */
.mano-bottom {
  background: transparent;
  border-bottom: 2px solid #ccc;
  padding: 10px;
  text-align: center;
  margin-bottom: 10px;
}

#mano {
  display: flex;
  gap: 5px;
  justify-content: center;
  flex-wrap: wrap;
  flex-wrap: nowrap; /* no saltar a segunda fila */
}

/* -------------------------------------------------- CARTAS */
.carta {
  border: 1px solid black;
  border-radius: 0;
  width: 80px;
  height: 112px;
  cursor: pointer;
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
}

.carta:hover {
  /* filter: brightness(1.1);          aclara ligeramente la carta */
  outline: 2px solid #31d1ae;      /* marco verde al hacer hover */
  outline-offset: -2px;            /* el marco queda por dentro de la carta */
}

.carta.seleccionada {
  outline: 2px solid red;
  outline-offset: -2px;
}

/* -------------------------------------------------- PREVIEW */
.preview {
  position: fixed;
  bottom: 80px;
  left: 10px;
  background: white;
  border: 2px solid black;
  padding: 15px;
  width: 18%;
  text-align: center;
  z-index: 10;
}

/* -------------------------------------------------- MARCADOR */
.marcador {
  display: flex;
  gap: 15px;
  font-size: 16px;
  font-weight: bold;
  color: white;
}

/* -------------------------------------------------- TOOLTIP */
.tooltip {
  display: none;
  position: fixed;
  background: none;
  border: none;
  padding: 0;
  z-index: 100;
  width: 250px;
  pointer-events: none;
}

/* -------------------------------------------------- ZONAS */
.zona {
  position: absolute;
  width: 80px;
  height: 112px;
  border: 2px solid rgba(0, 0, 0, 0.4);
  border-radius: 0px;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  font-size: 11px;
  font-weight: bold;
  color: white;
}

/* zona tumbada horizontal */
.zona.horizontal {
  width: 112px;
  height: 80px;
}

.zona .carta {
  position: absolute;
  width: 74px;
  height: 104px;
  background: white;
  border: 1px solid black;
  font-size: 10px;
  cursor: pointer;
  text-align: center;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 4px;
  color: black;
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
}

.lado {
  display: flex;
  flex-direction: column;
  gap: 6px;
  align-items: center;
  width: 100%;
}

.red {
  font-size: 20px;
  font-weight: bold;
  margin: 10px 0;
}

/* -------------------------------------------------- BOTONES */
button {
  display: block;
  width: 100%;
  margin: 5px 0;
  padding: 8px;
  cursor: pointer;
}

.panel {
  margin-bottom: 15px;
  padding: 10px;
  background: white;
  border: 1px solid #ccc;
}
/* -------------------------------------------------- LADO JUGADOR */
.lado {
  display: flex;
  flex-direction: column;
  gap: 6px;
  align-items: center;
  width: 100%;
}

.fila-zonas {
  display: flex;
  gap: 6px;
  justify-content: center;
  align-items: flex-start;
}

/* -------------------------------------------------- COLORES */
.zona-recepcion  { background: #1565c0; }
.zona-pase       { background: #2e7d32; }
.zona-remate     { background: #c62828; }
.zona-bloqueo    { background: #212121; }
.zona-apoyo      { background: #616161; }
.zona-mazo       { background: #2c2c2c; }
.zona-puntos     { background: #b0bec5; }
.zona-trash      { background: #b0bec5; color: #333; }
.zona-saque      { background: #e65100; }
.zona-eventos    { background: #b0bec5; color: #333; }

/* -------------------------------------------------- ZONA LATERAL */
.lateral {
  display: flex;
  flex-direction: column;
  gap: 6px;
  justify-content: space-between;
}

/* -------------------------------------------------- POSICIONES JUGADOR 1 */
#campo-j1 .zona-puntos    { top: 0px;    left: 50px; }
#campo-j1 .zona-saque     { top: 150px;   left: 80px; }
#campo-j1 #j1-bloqueo     { top: 0px;    left: 256px; }
#campo-j1 #j1-recepcion   { top: 118px;  left: 170px; }
#campo-j1 #j1-pase        { top: 118px;  left: 256px; }
#campo-j1 #j1-remate      { top: 118px;  left: 342px; }
#campo-j1 #j1-bloqueoApoyoIzq { top: 0px; left: 170px; }
#campo-j1 #j1-bloqueoApoyo    { top: 0px; left: 342px; }
#campo-j1 #j1-eventos     { top: 150px;  left: -5px; }
#campo-j1 #j1-mazo        { top: 75px;    left: 430px;}
#campo-j1 #j1-trash       { top: 75px;  left: 515px; }

/* -------------------------------------------------- POSICIONES JUGADOR 2 (espejo) */
#campo-j2 .zona-puntos    { top: 160px;  left: 430px; }
#campo-j2 .zona-saque     { top: -20px;   left: 430px; }
#campo-j2 #j2-bloqueo     { top: 130px;  left: 256px; }
#campo-j2 #j2-recepcion   { top: 12px;    left: 342px; }
#campo-j2 #j2-pase        { top: 12px;    left: 256px; }
#campo-j2 #j2-remate      { top: 12px;    left: 170px; }
#campo-j2 #j2-bloqueoApoyoIzq { top: 130px; left: 170px; }
#campo-j2 #j2-bloqueoApoyo           { top: 130px; left: 342px; }
#campo-j2 #j2-eventos     { top: -20px;    left: 515px; }
#campo-j2 #j2-mazo        { top: 65px;  left: 80px; }
#campo-j2 #j2-trash       { top: 65px;   left: -5px; }

.zona.horizontal .carta {/* las cartas de las zonas horizontales están en horizontal */
  width: 104px;
  height: 74px;
}

.btn-campo {
  color: white;
  font-weight: bold;
  border: 2px solid rgba(0, 0, 0, 0.4);
  border-radius: 0;
  cursor: pointer;
  font-size: 10px;
  padding: 3px;
}

#btn-evento {
  position: absolute;
  top: 260px;       
  left: -5px;
  width: 80px;
  font-size: 10px;
  padding: 3px;
  background: #b0bec5;
  color: #333;
}

#btn-saque {
  position: absolute;
  top: 122px; 
  left: 80px;
  width: 80px;
  font-size: 10px;
  padding: 3px;
  background: #e65100;
  /* display: none;  oculto por defecto */
}

#btn-recepcion {
  position: absolute;
  top: 228px; 
  left: 170px;
  width: 80px;
  font-size: 10px;
  padding: 3px;
  background: #1565c0;
  /* display: none; oculto por defecto */
}

#btn-pase {
  position: absolute;
  top: 228px; 
  left: 256px;
  width: 80px;
  background: #2e7d32;
}

#btn-remate {
  position: absolute;
  top: 228px;
  left: 342px;
  width: 80px;
  background: #c62828;
}

#btn-bloqueo {
  position: absolute;
  top: -5px; /* encima del bloqueo, pero ya está arriba del todo */
  left: 430px;
  width: 80px; /* ancho para cubrir los 3 bloqueadores */
  background: #212121;
}

/* -------------------------------------------------- CONTADORES DE ZONA */
.zona-contador {
  position: absolute;
  top: 5px;
  right: 4px;
  background: rgba(0, 0, 0, 0.75);
  color: #fff;
  font-size: 10px;
  font-weight: bold;
  padding: 1px 4px;
  border-radius: 3px;
  z-index: 30;
  pointer-events: none;
  line-height: 1.4;
}

</style>
<!----------------------------------------------------------------------------------------------------------------------------->
